inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rails
  - rubocop-minitest
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - 'db/schema.rb'
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'log/**/*'

# Disable cops that conflict with existing codebase style
# These can be gradually enabled in future PRs

Style/StringLiterals:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Metrics/MethodLength:
  Max: 30

Metrics/AbcSize:
  Max: 40

Metrics/ClassLength:
  Max: 250
  Exclude:
    - 'test/**/*'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'test/**/*'

Metrics/PerceivedComplexity:
  Exclude:
    - 'test/**/*'

Metrics/ParameterLists:
  Exclude:
    - 'test/**/*'

Metrics/BlockLength:
  Max: 35
  Exclude:
    - 'test/**/*'
    - 'config/**/*'
    - 'db/**/*'

Layout/LineLength:
  Max: 180
  Exclude:
    - 'test/**/*'

Rails/Output:
  Exclude:
    - 'lib/fastladder/crawler.rb'

Rails/SkipsModelValidations:
  Enabled: false

Rails/HasManyOrHasOneDependent:
  Enabled: false

Rails/InverseOf:
  Enabled: false

Minitest/MultipleAssertions:
  Max: 10

Metrics/ModuleLength:
  Exclude:
    - 'test/support/**/*'
