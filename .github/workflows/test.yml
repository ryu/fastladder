name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  RAILS_ENV: test

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.8
          bundler-cache: true

      - name: Security audit
        run: bundle exec bundle-audit check --update

      - name: Brakeman security scan
        run: bundle exec brakeman --no-pager -w3
        # -w3 = High confidence warnings only

      - name: RuboCop
        run: bundle exec rubocop --parallel --format github

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: mfinelli/setup-imagemagick@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.8
          bundler-cache: true

      - name: Prepare DB
        run: |
          bundle exec rails db:prepare

      - name: Run tests
        run: |
          bundle exec rails test

      - uses: browser-actions/setup-chrome@v2

      - name: Run system tests
        run: |
          xvfb-run bundle exec rails test:system
